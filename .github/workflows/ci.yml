name: CI Pipeline

on:
  push:
    branches:
      - main
      - release
  pull_request:

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest flake8

      - name: Run linter
        run: flake8 .

      - name: Run tests
        run: pytest

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: project-files
          path: .
          